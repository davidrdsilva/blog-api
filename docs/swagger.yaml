basePath: /api
definitions:
  dtos.CategoryCountListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dtos.CategoryCountResponse'
        type: array
    type: object
  dtos.CategoryCountResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      total_posts:
        type: integer
    type: object
  dtos.CategoryListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dtos.CategoryResponse'
        type: array
    type: object
  dtos.CategoryResponse:
    properties:
      id:
        type: integer
      is_internal:
        type: boolean
      name:
        type: string
    type: object
  dtos.CharacterResponse:
    properties:
      createdAt:
        type: string
      description:
        type: string
      full_name:
        type: string
      id:
        type: string
      location:
        type: string
      occupation:
        type: string
      portrait:
        type: string
      short_name:
        type: string
      skills:
        $ref: '#/definitions/models.CharacterSkills'
      updatedAt:
        type: string
    type: object
  dtos.CharacterSkillsRequest:
    properties:
      endurance:
        maximum: 100
        minimum: 0
        type: integer
      guns:
        maximum: 100
        minimum: 0
        type: integer
      intellect:
        maximum: 100
        minimum: 0
        type: integer
      melee:
        maximum: 100
        minimum: 0
        type: integer
      persuasion:
        maximum: 100
        minimum: 0
        type: integer
      stealth:
        maximum: 100
        minimum: 0
        type: integer
    type: object
  dtos.CommentListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dtos.CommentResponse'
        type: array
    type: object
  dtos.CommentResponse:
    properties:
      author:
        type: string
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      postId:
        type: string
    type: object
  dtos.CreateCharacterRequest:
    properties:
      description:
        minLength: 1
        type: string
      full_name:
        maxLength: 120
        minLength: 1
        type: string
      location:
        maxLength: 160
        minLength: 1
        type: string
      occupation:
        maxLength: 120
        minLength: 1
        type: string
      portrait:
        type: string
      short_name:
        maxLength: 60
        minLength: 1
        type: string
      skills:
        $ref: '#/definitions/dtos.CharacterSkillsRequest'
    required:
    - description
    - full_name
    - location
    - occupation
    - portrait
    - short_name
    - skills
    type: object
  dtos.CreateCommentRequest:
    properties:
      author:
        type: string
      content:
        type: string
      postId:
        type: string
    type: object
  dtos.CreatePostRequest:
    properties:
      author:
        maxLength: 100
        minLength: 1
        type: string
      category_id:
        minimum: 1
        type: integer
      character_ids:
        items:
          type: string
        type: array
      content:
        $ref: '#/definitions/models.EditorJsContent'
      date:
        type: string
      description:
        maxLength: 100
        minLength: 1
        type: string
      image:
        type: string
      subtitle:
        maxLength: 300
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        maxLength: 200
        minLength: 1
        type: string
      whitenest_chapter_number:
        minimum: 1
        type: integer
    required:
    - author
    - category_id
    - description
    - title
    type: object
  dtos.EditorJsErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  dtos.EditorJsFileInfo:
    properties:
      url:
        type: string
    type: object
  dtos.EditorJsURLResponse:
    properties:
      error:
        $ref: '#/definitions/dtos.EditorJsErrorDetail'
      link:
        type: string
      meta:
        $ref: '#/definitions/dtos.URLMetadata'
      success:
        type: integer
    type: object
  dtos.EditorJsUploadResponse:
    properties:
      error:
        $ref: '#/definitions/dtos.EditorJsErrorDetail'
      file:
        $ref: '#/definitions/dtos.EditorJsFileInfo'
      success:
        type: integer
    type: object
  dtos.ErrorDetail:
    properties:
      code:
        type: string
      details:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      message:
        type: string
    type: object
  dtos.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/dtos.ErrorDetail'
    type: object
  dtos.PostListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dtos.PostResponse'
        type: array
      meta:
        $ref: '#/definitions/models.PaginationMeta'
    type: object
  dtos.PostResponse:
    properties:
      author:
        type: string
      category:
        $ref: '#/definitions/dtos.CategoryResponse'
      category_id:
        type: integer
      characters:
        items:
          $ref: '#/definitions/dtos.CharacterResponse'
        type: array
      content:
        $ref: '#/definitions/models.EditorJsContent'
      createdAt:
        type: string
      date:
        type: string
      description:
        type: string
      id:
        type: string
      image:
        type: string
      subtitle:
        type: string
      tags:
        items:
          $ref: '#/definitions/dtos.TagResponse'
        type: array
      title:
        type: string
      total_views:
        type: integer
      updatedAt:
        type: string
      whitenest_chapter_number:
        type: integer
    type: object
  dtos.SuccessResponse:
    properties:
      data: {}
    type: object
  dtos.TagListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dtos.TagResponse'
        type: array
    type: object
  dtos.TagResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dtos.URLImageInfo:
    properties:
      url:
        type: string
    type: object
  dtos.URLMetadata:
    properties:
      description:
        type: string
      image:
        $ref: '#/definitions/dtos.URLImageInfo'
      title:
        type: string
    type: object
  dtos.UpdateCharacterRequest:
    properties:
      description:
        minLength: 1
        type: string
      full_name:
        maxLength: 120
        minLength: 1
        type: string
      location:
        maxLength: 160
        minLength: 1
        type: string
      occupation:
        maxLength: 120
        minLength: 1
        type: string
      portrait:
        type: string
      short_name:
        maxLength: 60
        minLength: 1
        type: string
      skills:
        $ref: '#/definitions/dtos.CharacterSkillsRequest'
    type: object
  dtos.UpdatePostRequest:
    properties:
      category_id:
        minimum: 1
        type: integer
      character_ids:
        items:
          type: string
        type: array
      content:
        $ref: '#/definitions/models.EditorJsContent'
      date:
        type: string
      description:
        maxLength: 100
        minLength: 1
        type: string
      image:
        type: string
      subtitle:
        maxLength: 300
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        maxLength: 200
        minLength: 1
        type: string
      whitenest_chapter_number:
        minimum: 1
        type: integer
    type: object
  dtos.WhitenestChapterRef:
    properties:
      id:
        type: string
      title:
        type: string
      whitenest_chapter_number:
        type: integer
    type: object
  dtos.WhitenestChapterResponse:
    properties:
      cast:
        items:
          $ref: '#/definitions/dtos.CharacterResponse'
        type: array
      chapter:
        $ref: '#/definitions/dtos.PostResponse'
      next:
        $ref: '#/definitions/dtos.WhitenestChapterRef'
      previous:
        $ref: '#/definitions/dtos.WhitenestChapterRef'
    type: object
  dtos.WhitenestChapterSummary:
    properties:
      id:
        type: string
      image:
        type: string
      tags:
        items:
          $ref: '#/definitions/dtos.TagResponse'
        type: array
      title:
        type: string
      whitenest_chapter_number:
        type: integer
    type: object
  models.CharacterSkills:
    properties:
      endurance:
        type: integer
      guns:
        type: integer
      intellect:
        type: integer
      melee:
        type: integer
      persuasion:
        type: integer
      stealth:
        type: integer
    type: object
  models.EditorJsBlock:
    properties:
      data:
        additionalProperties: true
        type: object
      id:
        type: string
      type:
        type: string
    type: object
  models.EditorJsContent:
    properties:
      blocks:
        items:
          $ref: '#/definitions/models.EditorJsBlock'
        type: array
      time:
        description: Unix timestamp in milliseconds
        type: integer
      version:
        description: Editor.js version
        type: string
    type: object
  models.PaginationMeta:
    properties:
      hasMore:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
info:
  contact: {}
  description: RESTful backend for a blog client. Handles posts, image uploads, and
    URL metadata extraction for Editor.js integration.
  title: Blog API
  version: "1.0"
paths:
  /categories:
    get:
      parameters:
      - description: Case-insensitive name search
        in: query
        name: search
        type: string
      - description: Include internal categories (e.g. Drafts) in the response. Default
          false.
        in: query
        name: include_internal
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.CategoryListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List categories
      tags:
      - categories
  /characters:
    get:
      description: |-
        Returns all characters, alphabetized by short name. Optionally
        filter by `?search=` (case-insensitive on full and short name).
      parameters:
      - description: Substring search on short_name/full_name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dtos.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dtos.CharacterResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List characters
      tags:
      - characters
    post:
      consumes:
      - application/json
      parameters:
      - description: Character payload
        in: body
        name: character
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateCharacterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dtos.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CharacterResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Create a character
      tags:
      - characters
  /characters/{id}:
    delete:
      parameters:
      - description: Character UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Delete a character
      tags:
      - characters
    get:
      parameters:
      - description: Character UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dtos.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CharacterResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Get a character by ID
      tags:
      - characters
    put:
      consumes:
      - application/json
      parameters:
      - description: Character UUID
        in: path
        name: id
        required: true
        type: string
      - description: Patch payload
        in: body
        name: character
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdateCharacterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dtos.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CharacterResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Update a character
      tags:
      - characters
  /comments:
    get:
      parameters:
      - description: Filter by post ID
        in: query
        name: postId
        type: string
      - description: Filter by author
        in: query
        name: author
        type: string
      - description: Sort field
        in: query
        name: sortBy
        type: string
      - description: asc or desc
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.CommentListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List comments
      tags:
      - comments
    post:
      consumes:
      - application/json
      parameters:
      - description: Comment payload
        in: body
        name: comment
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Create a comment
      tags:
      - comments
  /comments/{id}:
    delete:
      parameters:
      - description: Comment UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Delete a comment
      tags:
      - comments
  /fetch-url:
    get:
      parameters:
      - description: URL to fetch metadata from
        in: query
        name: url
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.EditorJsURLResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.EditorJsURLResponse'
      summary: Fetch URL metadata
      tags:
      - url
  /posts:
    get:
      parameters:
      - description: Search term
        in: query
        name: search
        type: string
      - description: Filter by author
        in: query
        name: author
        type: string
      - description: Filter by category ID
        in: query
        name: category_id
        type: integer
      - collectionFormat: multi
        description: Filter by tag names (OR semantics; repeat the param or comma-join)
        in: query
        items:
          type: string
        name: tags
        type: array
      - description: Sort field
        enum:
        - date
        - title
        - createdAt
        - updatedAt
        in: query
        name: sortBy
        type: string
      - description: asc or desc
        enum:
        - asc
        - desc
        in: query
        name: sortOrder
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 6, max 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.PostListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List posts
      tags:
      - posts
    post:
      consumes:
      - application/json
      parameters:
      - description: Post payload
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/dtos.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Create a post
      tags:
      - posts
  /posts/{id}:
    delete:
      parameters:
      - description: Post UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Delete a post
      tags:
      - posts
    get:
      parameters:
      - description: Post UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Get a post by ID
      tags:
      - posts
    put:
      consumes:
      - application/json
      parameters:
      - description: Post UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Update a post
      tags:
      - posts
  /posts/{id}/similar:
    get:
      parameters:
      - description: Post UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.PostListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List posts similar to the given post
      tags:
      - posts
  /posts/count/by-category:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.CategoryCountListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Count posts grouped by category
      tags:
      - categories
  /posts/drafts:
    get:
      description: Returns posts whose category is flagged is_internal (e.g. Drafts).
      parameters:
      - description: Full-text search
        in: query
        name: search
        type: string
      - description: Sort field
        enum:
        - date
        - title
        - createdAt
        - updatedAt
        in: query
        name: sortBy
        type: string
      - description: asc or desc
        enum:
        - asc
        - desc
        in: query
        name: sortOrder
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 6, max 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.PostListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List draft posts (admin)
      tags:
      - posts
  /posts/most-viewed:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.PostListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List the most viewed posts
      tags:
      - posts
  /tags:
    get:
      parameters:
      - description: Case-insensitive name search
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.TagListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: List tags
      tags:
      - tags
  /upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Image or video file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.EditorJsUploadResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.EditorJsUploadResponse'
      summary: Upload a file (image or video)
      tags:
      - upload
  /whitenest/chapters:
    get:
      description: |-
        Returns every Whitenest chapter ordered by chapter number ASC
        with the lightweight fields needed for list views (id, title,
        image, tags, chapter number).
      produces:
